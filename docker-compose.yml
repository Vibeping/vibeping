# VibePing Self-Hosting Docker Compose
#
# PREREQUISITES:
#   VibePing requires Supabase for authentication and database.
#   You need a Supabase project (cloud or self-hosted) before running this.
#
#   1. Create a Supabase project at https://supabase.com (free tier works)
#      OR self-host Supabase: https://supabase.com/docs/guides/self-hosting
#   2. Run the migrations in supabase/migrations/ against your Supabase DB
#   3. Copy .env.example to .env and fill in your Supabase credentials:
#        NEXT_PUBLIC_SUPABASE_URL=https://your-project.supabase.co
#        NEXT_PUBLIC_SUPABASE_ANON_KEY=your-anon-key
#        SUPABASE_SERVICE_ROLE_KEY=your-service-role-key
#   4. Run: docker compose up -d
#
# The dashboard will be available at http://localhost:3000

services:
  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
    ports:
      - '3000:3000'
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_VIBEPING_API_URL: http://localhost:3000/api
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:?Set NEXT_PUBLIC_SUPABASE_URL in .env}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:?Set NEXT_PUBLIC_SUPABASE_ANON_KEY in .env}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:?Set SUPABASE_SERVICE_ROLE_KEY in .env}
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000/']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
