version: '3.8'

services:
  db:
    image: supabase/postgres:15.1.1.41
    ports:
      - '5432:5432'
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vibeping}
      POSTGRES_DB: vibeping
    volumes:
      - pgdata:/var/lib/postgresql/data

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-vibeping}@db:5432/vibeping
      NEXT_PUBLIC_VIBEPING_API_URL: http://localhost:3000/api
    depends_on:
      - db

volumes:
  pgdata:
