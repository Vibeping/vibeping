name: Feature Request
description: Suggest a feature or improvement
labels: ['enhancement']
body:
  - type: input
    id: summary
    attributes:
      label: Summary
      description: One-line description of the feature
      placeholder: 'Add session replay support'
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem / Motivation
      description: What problem does this solve? Why do you need it?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Other approaches you thought of
